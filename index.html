<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f7fb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VOXFLOW</title>
  <meta name="description" content="Gemini Flash 모델을 활용한 단일 HTML 텍스트 음성 변환 웹앱">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <header class="glass-panel">
      <div class="logo-container"><div class="logo-icon"><i data-lucide="waves"></i></div><div class="logo-text">VOXFLOW</div></div>
      <div class="header-actions"><div class="apikey-container"><div id="api-key-wrapper" class="apikey-input-wrapper"><i data-lucide="key-round"></i><input type="password" id="api-key" class="apikey-input" placeholder="Gemini API Key 입력..." autocomplete="off"><label class="apikey-persist-label"><input type="checkbox" id="chk-persist-key">기기에 저장</label><button id="btn-save-api-key" class="apikey-action" type="button">저장</button><button id="btn-edit-api-key" class="apikey-action hidden" type="button">수정</button><button id="btn-delete-api-key" class="apikey-action apikey-delete hidden" type="button">삭제</button><i class="lock-icon" data-lucide="lock" style="width:14px; height:14px; margin-left:6px;"></i></div></div></div>
    </header>

    <main class="main-grid">
      <section class="input-panel glass-panel">
        <div class="tab-container"><button id="tab-md" class="tab-btn active"><i data-lucide="file-text" style="width: 14px; height: 14px;"></i> Markdown 파일</button><button id="tab-text" class="tab-btn"><i data-lucide="align-left" style="width: 14px; height: 14px;"></i> 직접 텍스트 입력</button></div>
        <div id="content-md-input" class="tab-content active"><div id="upload-zone" class="upload-zone"><div class="upload-icon"><i data-lucide="cloud-upload" style="width: 32px; height: 32px;"></i></div><h3>마크다운 문서 로드</h3><p>마크다운(.md) 또는 텍스트(.txt) 파일을 이곳에 드래그 앤 드롭하거나 클릭하여 선택하세요.</p><button class="btn btn-secondary">파일 선택</button><input type="file" id="file-input" class="hidden" accept=".md,.txt,text/markdown,text/plain"></div><div id="file-info-card" class="file-info-card hidden"><div class="file-info-details"><i data-lucide="file-check"></i><div><div id="file-name" class="file-name">document.md</div><div id="file-size" class="file-size">1.2 KB</div></div></div><button id="btn-remove-file" class="btn btn-icon btn-remove" title="파일 삭제"><i data-lucide="trash-2" style="width: 16px; height: 16px;"></i></button></div></div>
        <div id="content-text-input" class="tab-content"><div class="textarea-wrapper"><textarea id="textarea-input" class="rich-textarea" placeholder="음성으로 변환하여 읽어줄 문장이나 문단을 입력하세요..."></textarea><div class="textarea-footer"><span id="char-counter">0 자</span><span>최대 약 20,000자 권장</span></div></div><button id="btn-generate" class="btn btn-primary" style="margin-top: 12px; width: 100%;"><i data-lucide="sparkles"></i> 텍스트 분석 및 플레이리스트 생성</button></div>
        <div class="settings-section"><div class="settings-grid"><div class="form-group"><label for="select-voice">음성 캐릭터</label><select id="select-voice" class="select-custom"><option value="Kore" selected>Kore (Firm, 단단함)</option><option value="Zephyr">Zephyr (Bright, 밝음)</option><option value="Puck">Puck (Upbeat, 경쾌함)</option><option value="Charon">Charon (Informative, 설명형)</option><option value="Fenrir">Fenrir (Excitable, 들뜸)</option><option value="Leda">Leda (Youthful, 젊은 느낌)</option><option value="Orus">Orus (Firm, 단단함)</option><option value="Aoede">Aoede (Breezy, 산뜻함)</option><option value="Callirrhoe">Callirrhoe (Easy-going, 여유로움)</option><option value="Autonoe">Autonoe (Bright, 밝음)</option><option value="Enceladus">Enceladus (Breathy, 숨결감)</option><option value="Iapetus">Iapetus (Clear, 또렷함)</option><option value="Umbriel">Umbriel (Easy-going, 여유로움)</option><option value="Algieba">Algieba (Smooth, 부드러움)</option><option value="Despina">Despina (Smooth, 부드러움)</option><option value="Erinome">Erinome (Clear, 또렷함)</option><option value="Algenib">Algenib (Gravelly, 거친 질감)</option><option value="Rasalgethi">Rasalgethi (Informative, 설명형)</option><option value="Laomedeia">Laomedeia (Upbeat, 경쾌함)</option><option value="Achernar">Achernar (Soft, 온화함)</option><option value="Alnilam">Alnilam (Firm, 단단함)</option><option value="Schedar">Schedar (Even, 고른 톤)</option><option value="Gacrux">Gacrux (Mature, 성숙함)</option><option value="Pulcherrima">Pulcherrima (Forward, 적극적)</option><option value="Achird">Achird (Friendly, 친근함)</option><option value="Zubenelgenubi">Zubenelgenubi (Casual, 캐주얼)</option><option value="Vindemiatrix">Vindemiatrix (Gentle, 점잖음)</option><option value="Sadachbia">Sadachbia (Lively, 생동감)</option><option value="Sadaltager">Sadaltager (Knowledgeable, 지적인 느낌)</option><option value="Sulafat">Sulafat (Warm, 따뜻함)</option></select></div><div class="form-group style-hint-wrapper"><label for="input-style-hint">말투 및 감정 스타일 지정</label><input type="text" id="input-style-hint" class="input-custom" placeholder="예: 차분하고 전문적인 비즈니스 톤으로, 약간 빠르고 역동적으로 낭독해줘..."></div></div></div>
      </section>
      <section class="display-panel"><div class="visualizer-container glass-panel"><div class="visualizer-header"><div id="status-badge" class="status-badge idle"><div class="indicator-dot"></div><span id="status-text">대기 중</span></div><button id="btn-cancel-transform" class="btn btn-cancel-transform hidden" type="button"><i data-lucide="x-circle" style="width:13px;height:13px;"></i> 변환 취소</button><div id="segment-counter" class="segment-counter">청크 0 / 0</div></div><canvas id="visualizer-canvas" class="visualizer-canvas"></canvas></div><div class="player-dashboard glass-panel"><div class="progress-track-wrapper"><div class="progress-slider-container"><span id="time-elapsed">0:00</span><input type="range" id="progress-bar" class="range-slider" min="0" max="100" value="0" disabled><span id="time-total">0:00</span></div></div><div class="player-controls-row"><div class="controls-left-group"><div class="speed-control-badge"><i data-lucide="gauge" style="width: 14px; height: 14px;"></i><select id="speed-input" class="speed-select"><option value="1.0" selected>1.0</option><option value="1.5">1.5</option><option value="2.0">2.0</option></select><span>배속</span></div></div><div class="controls-center-group"><button id="btn-prev" class="btn btn-icon" title="이전 청크"><i data-lucide="skip-back"></i></button><button id="btn-play-pause" class="btn-play-pause" title="재생/일시정지"><i data-lucide="play"></i></button><button id="btn-next" class="btn btn-icon" title="다음 청크"><i data-lucide="skip-forward"></i></button><button id="btn-stop" class="btn btn-icon" title="정지"><i data-lucide="square"></i></button></div><div class="controls-right-group"><div class="volume-container"><i data-lucide="volume-2" style="width: 16px; height: 16px;"></i><input type="range" id="volume-slider" class="range-slider volume-slider" min="0" max="1" step="0.05" value="1"></div></div></div></div><div class="preview-panel glass-panel"><div class="preview-header-row"><div id="preview-title" class="preview-title"><i data-lucide="book-open"></i> 스마트 프리뷰어</div><button id="btn-toggle-view" class="btn btn-secondary btn-icon hidden" title="보기 모드 전환" style="width: auto; padding: 4px 12px; font-size: 11px;"><i data-lucide="list-music" style="width: 12px; height: 12px;"></i> Playlist Mode</button></div><div id="preview-body" class="markdown-body"><p class="text-muted text-center" style="padding: 40px 0;">왼쪽 패널에 마크다운 파일을 업로드하거나 텍스트를 입력하여 재생을 준비하세요.</p></div><div id="playlist-container" class="playlist-view hidden"><p class="text-muted text-center" style="padding: 20px 0;">플레이리스트가 비어 있습니다.</p></div></div></section>
    </main>
  </div>

  <script defer src="app.js"></script>
</body>
</html>
